# Axe Accessibility Linter configuration
# https://docs.deque.com/linter/4.0.0/en/axe-linter-configuration/

# Enforce WCAG 2.0/2.1 Level A and AA rules, plus Deque best practices.
tags:
  - wcag2a
  - wcag2aa
  - wcag21a
  - wcag21aa
  - best-practices

# Generated and third-party files are not authored application source.
exclude:
  - '**/node_modules/**'
  - '**/.next/**'
  - '**/storybook-static/**'
  - '**/coverage/**'
  - '**/dist/**'
  - '**/build/**'

# Axe Linter does not provide a preconfigured Chakra UI component library.
# Map common Chakra and local wrapper names to their emitted HTML elements.
global-components:
  Button: button
  CloseButton: button
  IconButton: button
  Input: input
  Link: a
  Textarea: textarea
  Image: img
